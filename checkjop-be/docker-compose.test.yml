services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=checkjop_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-test:
    build: 
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      - DB_HOST=postgres-test
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=checkjop_test
      - DB_SSLMODE=disable
      - GIN_MODE=test
    networks:
      - test-network
    command: ["go", "test", "-v", "-race", "-coverprofile=coverage.out", "./..."]
    volumes:
      - ./coverage.out:/app/coverage.out

volumes:
  postgres_test_data:

networks:
  test-network:
    driver: bridge