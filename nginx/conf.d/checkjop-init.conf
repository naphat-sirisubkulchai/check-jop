# ใช้ไฟล์นี้ตอน init SSL ครั้งแรก (ก่อนมี certificate)
# สลับกับ checkjop.conf โดย: mv checkjop.conf checkjop.conf.bak && mv checkjop-init.conf checkjop.conf
# แล้วหลังได้ cert แล้ว: mv checkjop.conf checkjop-init.conf && mv checkjop.conf.bak checkjop.conf

server {
    listen 80;
    server_name checkjop-cscu.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
